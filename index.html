<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALFABETO SEGRETO</title>
</head>

<body style="font-family:serif; text-align:center; margin-top:40px;">

<h2>ALFABETO SEGRETO</h2>

<!-- BARRA -->
<div id="barra"
     style="border:2px solid black;
            height:120px;
            width:90%;
            max-width:500px;
            margin:20px auto;
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            align-items:center;
            gap:6px;
            padding:8px;">
</div>

<br>

<!-- BOTTONI -->
<button onclick="aggiungi('A','piramide.png')"><img src="piramide.png" width="50"></button>
<button onclick="aggiungi('B','serpente.png')"><img src="serpente.png" width="50"></button>
<button onclick="aggiungi('C','macedonia.png')"><img src="macedonia.png" width="50"></button>
<button onclick="aggiungi('D','macchina.png')"><img src="macchina.png" width="50"></button>
<button onclick="aggiungi('E','stargate.png')"><img src="stargate.png" width="50"></button>
<button onclick="aggiungi('F','mango.png')"><img src="mango.png" width="50"></button>
<button onclick="aggiungi('G','cerchio.png')"><img src="cerchio.png" width="50"></button>
<button onclick="aggiungi('H','mela.png')"><img src="mela.png" width="50"></button>
<button onclick="aggiungi('I','arancia.png')"><img src="arancia.png" width="50"></button>

<br><br>

<button onclick="invia()">INVIA</button>
<button onclick="reset()">RESET</button>

<p id="codice"></p>

<div id="output"></div>

<script>

let codiceInterno = "";

// 🧩 mappa simboli → codice segreto
function aggiungi(valore, imgSrc) {

  // mostra immagine nella barra
  let img = document.createElement("img");
  img.src = imgSrc;
  img.width = 50;

  document.getElementById("barra").appendChild(img);

  // costruisce codice segreto (A B C D...)
  codiceInterno += valore;
}

// 📖 POESIE SEGRETE
const poesie = {
  "AB": {
    titolo: "Soglia",
    testo: "La piramide incontra il serpente nel silenzio"
  },

  "ABC": {
    titolo: "Inizio del viaggio",
    testo: "Tre simboli aprono la porta del senso"
  },

  "AEI": {
    titolo: "Vertice luminoso",
    testo: "Struttura, varco e luce si incontrano"
  },

  "BHI": {
    titolo: "Trasformazione",
    testo: "Il serpente diventa frutto e luce"
  }
};

// 🚀 controlla codice e mostra poesia
function invia() {

  document.getElementById("codice").innerText =
    "Codice: " + codiceInterno;

  const poesia = poesie[codiceInterno];
  const output = document.getElementById("output");

  if (poesia) {
    output.innerHTML =
      "<h3>" + poesia.titolo + "</h3>" +
      "<pre style='white-space:pre-wrap; font-size:18px;'>" +
      poesia.testo +
      "</pre>";
  } else {
    output.innerHTML = "❌ nessuna poesia per questo codice";
  }
}

// 🔄 reset tutto
function reset() {
  codiceInterno = "";
  document.getElementById("barra").innerHTML = "";
  document.getElementById("codice").innerText = "";
  document.getElementById("output").innerHTML = "";
}

</script>

</body>
</html>
