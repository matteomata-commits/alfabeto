<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEMOCODEX</title>
</head>

<body style="background-color:#ffffff !important; font-family:serif; text-align:center; margin-top:40px;">

<h2>DEMOCODEX</h2>

<!-- BARRA -->
<div id="barra"
     style="border:2px solid black;
            height:120px;
            width:90%;
            max-width:500px;
            margin:20px auto;
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            align-items:center;
            gap:6px;
            padding:8px;">
</div>

<br>

<!-- BOTTONI A GRIGLIA 3x3 -->
<div style="display:grid;
            grid-template-columns:repeat(3, 70px);
            grid-template-rows:repeat(3, 70px);
            gap:10px;
            justify-content:center;
            margin:0 auto;
            max-width:240px;">

  <button onclick="aggiungi('A','piramide.png')"><img src="piramide.png" width="50"></button>
  <button onclick="aggiungi('B','serpente.png')"><img src="serpente.png" width="50"></button>
  <button onclick="aggiungi('C','macedonia.png')"><img src="macedonia.png" width="50"></button>
  <button onclick="aggiungi('D','macchina.png')"><img src="macchina.png" width="50"></button>
  <button onclick="aggiungi('E','stargate.png')"><img src="stargate.png" width="50"></button>
  <button onclick="aggiungi('F','mango.png')"><img src="mango.png" width="50"></button>
  <button onclick="aggiungi('G','cerchio.png')"><img src="cerchio.png" width="50"></button>
  <button onclick="aggiungi('H','mela.png')"><img src="mela.png" width="50"></button>
  <button onclick="aggiungi('I','arancia.png')"><img src="arancia.png" width="50"></button>

</div>

<br>

<button onclick="invia()">INVIA</button>
<button onclick="reset()">RESET</button>

<p id="codice"></p>

<div id="output"></div>

<script>

let codiceInterno = "";

/* 🧩 AGGIUNGE SIMBOLO + COSTRUISCE CODICE */
function aggiungi(valore, imgSrc) {

  let img = document.createElement("img");
  img.src = imgSrc;
  img.width = 50;

  document.getElementById("barra").appendChild(img);

  // 🔥 sempre MAIUSCOLO (IMPORTANTISSIMO)
  codiceInterno += valore.toUpperCase();

  console.log("CODICE:", codiceInterno);
}

/* 📖 POESIE SEGRETE */
const poesie = {

  "HADFC": {
    titolo: "Goccia di storia",
    testo: `c'è una goccia di sangue o di rugiada
che sdrucciola tra i solchi della storia
che rende viva la carne dell'uomo
c'è una goccia di sangue o di rugiada
che scorre tra gli incavi della fronte
di gente in gente per generazioni
sulla tacita pelle dei mortali
ai primi raggi del sole essa appare
e rifulge di morte e primavera`
  },

  "BIEGA": {
    titolo: "Bandiere di pace",
    testo: `più bandiere di pace sulla terra
basta soldati morti per la guerra

più aquiloni in volo più colombe
basta a chi soffoca il cielo di bombe

più fratelli nel mondo più alleati
inondiamo di fiori i carri armati

più libri per bambini e per bambine
basta fucili bombe a mano e mine

che il vento scuota le nostre bandiere
basta bunker trincee e frontiere`
  },

  "FCAHI": {
    titolo: "Luna di cenere",
    testo: `oggi la luna è una perla di cenere
che si fa polvere tra le mie dita
oggi la luna è una perla di cenere
che sporca il grano e soffoca il raccolto

sferza nel cielo un tumulto di lame
grigie le lacrime austere le nuvole
tacito ascolto il pianto del bracciante
che per anni ha mietuto il suo raccolto

oggi la luna è una perla di cenere
che si fa polvere tra le mie dita
oggi la luna è una perla di cenere
che fa eco alle rovine del passato`
  },

  "GBDEI": {
    titolo: "Poeti erranti",
    testo: `si dovrà dire di noi poeti
che spettiniamo il sole
che strucchiamo la luna
che siamo i pagliacci e i saltimbanchi
di una carovana che fa del viaggio
la sua destinazione`
  }

};

/* 🚀 MOSTRA POESIA */
function invia() {

  document.getElementById("codice").innerText =
    "Codice: " + codiceInterno;

  const poesia = poesie[codiceInterno];
  const output = document.getElementById("output");

  if (poesia) {
    output.innerHTML =
      "<h3>" + poesia.titolo + "</h3>" +
      "<pre style='white-space:pre-wrap; font-size:18px;'>" +
      poesia.testo +
      "</pre>";
  } else {
    output.innerHTML = "❌ nessuna poesia per questo codice";
  }
}

/* 🔄 RESET */
function reset() {
  codiceInterno = "";
  document.getElementById("barra").innerHTML = "";
  document.getElementById("codice").innerText = "";
  document.getElementById("output").innerHTML = "";
}

</script>

</body>
</html>
